<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style(Calculator).css">
</head>
<head class="head">
    <div class="navigation-container">
        <h3 class="navigation-title">Calculator</h3>
        <img src="calculator.png" alt="" class="cacluclator-image">
    </div>
    <script defer src="script(Calculator).js"></script>
</head>
<body class="body">
    <div class="main-container">
        <div class="middle-conteiner">
            <div class="calculator">
                <div class="calculator-row" id="inputRow"></div>
                <div class="first-buttons-row">
                    <button class="b-C" id="C">C</button>
                    <button class="b-root" id="root">√</button>
                    <button class="b-percent" id="percent">%</button>
                    <button class="b-division" id="division">÷</button>
                </div>
                <div class="second-buttons-row">
                    <button class="b-7" id="7">7</button>
                    <button class="b-8" id="8">8</button>
                    <button class="b-9" id="9">9</button>
                    <button class="b-multiplication" id="multiplication">×</button>
                </div>
                <div class="third-buttons-row">
                    <button class="b-4" id="4">4</button>
                    <button class="b-5" id="5">5</button>
                    <button class="b-6" id="6">6</button>
                    <button class="b-minus" id="minus">-</button>
                </div>
                <div class="fours-buttons-row">
                    <button class="b-1" id="1">1</button>
                    <button class="b-2" id="2">2</button>
                    <button class="b-3" id="3">3</button>
                    <button class="b-plus" id="plus">+</button>
                </div>
                <div class="fifth-buttons-row">
                    <button class="b-negative" id="negative">+/-</button>
                    <button class="b-0" id="0">0</button>
                    <button class="b-decimal" id="decimal">,</button>
                    <button class="b-equals" id="equals">=</button>
                </div>
            </div>
        </div>
    </div>
</body>
<footer class="footer">
    <div class="footer-conteiner">
        <button class = "footer-button" id="back-b">Back</button>>
    </div>
</footer>
</html>
